    <div class="section">
        <div class="section-title">Existen 3 tipos de unidades relacionados con la longitud de un elemento</div>
        <div class="concept-grid">
            <div class="concept-card">
                <div class="label">Longitudes Absolutas</div>
                <div class="desc">Tienen un valor fijo que no depende del contexto. Ejemplos: <code>px</code>,
                    <code>cm</code>, <code>mm</code>, <code>in</code>. Se usan cuando necesitas un tamaño exacto.
                </div>
            </div>
            <div class="concept-card">
                <div class="label">Longitudes Relativas</div>
                <div class="desc">Cambian según el contexto (fuente, viewport o elemento padre). Ejemplos:
                    <code>em</code>, <code>rem</code>, <code>vw</code>, <code>vh</code>. Son ideales para diseños
                    adaptables.
                </div>
            </div>
            <div class="concept-card">
                <div class="label">Porcentajes</div>
                <div class="desc"><code>%</code> representa una proporción respecto al tamaño del contenedor padre.
                    Ejemplo: <code>width: 50%</code> ocupa la mitad del ancho disponible.</div>
            </div>
        </div>
    </div>

    <div class="section">
