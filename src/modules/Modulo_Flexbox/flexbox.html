                <div class="desc">Define cuánto puede crecer un item cuando sobra espacio en el contenedor. Ejemplo:

            </div>
            <div class="concept-card">
                <div class="label" style="color:#0F6E56;">flex-shrink</div>
                <div class="desc">Controla cuánto puede encogerse un item cuando falta espacio. Con

            </div>
            <div class="concept-card">
                <div class="label" style="color:#7B4B00;">flex-basis</div>
                <div class="desc">Es el tamaño base inicial antes de crecer o encoger. Ejemplo:
                    <code>flex-basis: 220px</code>.</div>
            </div>
            <div class="concept-card">
                <div class="label" style="color:#5A2A83;">Shorthand: flex</div>
                <div class="desc"><code>flex: grow shrink basis</code>. Ejemplos: <code>flex: 1</code> (crece para

            </div>
