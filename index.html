<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guía CSS Interactiva</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr@1.8.0/dist/themes/nano.min.css">
</head>

<body>

  <div class="guide">

    <div class="guide-header">
      <h1>Guía CSS Interactiva</h1>
      <p>Aprende CSS desde lo más básico hasta Grid — con demos en vivo para cada concepto.</p>
    </div>

    <!-- Navegación entre módulos -->
    <nav class="nav" id="mainNav">
      <button class="nav-btn active" data-target="0">¿Qué es CSS?</button>
      <button class="nav-btn" data-target="1">Selectores</button>
      <button class="nav-btn" data-target="2">Valores y Unidades</button>
      <button class="nav-btn" data-target="3">Cascada y Hover</button>
      <button class="nav-btn" data-target="4">Box Model</button>
      <button class="nav-btn" data-target="5">Position</button>
      <button class="nav-btn" data-target="6">Flexbox</button>
      <button class="nav-btn" data-target="7">Grid</button>
    </nav>

    <!-- ¿Qué es CSS? -->
    <div class="module visible">
      <intro-css></intro-css>
      <footer-module></footer-module>
    </div>

    <!-- Selectores -->
    <div class="module">
      <selectores-css></selectores-css>
      <reto-css reto-id="sel-clase-basico"></reto-css>
      <reto-css reto-id="sel-id-basico"></reto-css>
      <reto-css reto-id="sel-etiqueta-basico"></reto-css>
      <footer-module></footer-module>
    </div>

    <!-- Unidades -->
    <div class="module">
      <unidades-css></unidades-css>
      <reto-css reto-id="uni-px-basico"></reto-css>
      <reto-css reto-id="uni-em-rem-medio"></reto-css>
      <reto-css reto-id="uni-viewport-dificil"></reto-css>
      <footer-module></footer-module>
    </div>

    <!-- Box Model -->
    <div class="module">
      <box-model-css></box-model-css>
      <reto-css reto-id="box-padding-basico"></reto-css>
      <reto-css reto-id="box-sizing-medio"></reto-css>
      <reto-css reto-id="box-colapso-margin-dificil"></reto-css>
      <footer-module></footer-module>
    </div>

    <!-- Position -->
    <div class="module">
      <position-css></position-css>
      <reto-css reto-id="pos-badge-medio"></reto-css>
      <reto-css reto-id="pos-tooltip-medio"></reto-css>
      <reto-css reto-id="pos-sticky-overlay-dificil"></reto-css>
      <footer-module></footer-module>
    </div>

    <!-- Flexbox -->
    <div class="module">
      <flexbox-css></flexbox-css>
      <reto-css reto-id="flex-centrado-basico"></reto-css>
      <reto-css reto-id="flex-navbar-medio"></reto-css>
      <reto-css reto-id="flex-layout-complejo-dificil"></reto-css>
      <reto-css reto-id="flex-dashboard-muy-dificil"></reto-css>
      <footer-module></footer-module>
    </div>

    <!-- Grid -->
    <div class="module">
      <grid-css></grid-css>
      <reto-css reto-id="grid-basico-facil"></reto-css>
      <reto-css reto-id="grid-areas-medio"></reto-css>
      <reto-css reto-id="grid-masonry-dificil"></reto-css>
      <reto-css reto-id="grid-bento-muy-dificil"></reto-css>
      <footer-module></footer-module>
    </div>

    <!-- Cascada, Especificidad, Herencia y Hover -->
    <div class="module">
      <cascada-hover-css></cascada-hover-css>
      <reto-css reto-id="cas-especificidad-basico"></reto-css>
      <reto-css reto-id="hov-boton-basico"></reto-css>
      <footer-module></footer-module>
    </div>

    <!-- ES Modules: cada archivo tiene una responsabilidad clara -->
    <script type="module" src="/src/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr@1.8.0/dist/pickr.min.js"></script>
</body>

</html>
